<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner - VITACITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50">
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold">🔲 QR Scanner</h1>
                <a href="/" class="px-4 py-2 bg-white text-purple-600 rounded-lg">← Back</a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="max-w-2xl mx-auto">
            <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                <h2 class="text-xl font-bold mb-4">Scan Vehicle QR Code</h2>
                
                <div id="qr-reader" class="mb-4"></div>
                
                <div class="mt-4">
                    <p class="text-sm text-gray-600 mb-2">Or enter QR code manually:</p>
                    <div class="flex gap-2">
                        <input type="text" id="manual-qr" placeholder="VTC-QR-XXXXXXXXXX" 
                            class="flex-1 px-4 py-2 border border-gray-300 rounded-lg">
                        <button onclick="scanManualCode()" 
                            class="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">
                            Scan
                        </button>
                    </div>
                </div>
            </div>

            <div id="scan-result" class="hidden">
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <h3 class="text-xl font-bold mb-4">Vehicle Details</h3>
                    <div id="result-content"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // FIXED API URL
        const API_URL = window.location.origin;
        
        let html5QrcodeScanner;

        document.addEventListener('DOMContentLoaded', () => {
            try {
                html5QrcodeScanner = new Html5QrcodeScanner(
                    "qr-reader",
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    false
                );
                html5QrcodeScanner.render(onScanSuccess, onScanError);
            } catch (e) {
                console.error('QR Scanner init error:', e);
            }
        });

        function onScanSuccess(decodedText) {
            console.log(`QR Code: ${decodedText}`);
            html5QrcodeScanner.clear();
            fetchVehicleDetails(decodedText);
        }

        function onScanError(error) {
            // Silent
        }

        function scanManualCode() {
            const code = document.getElementById('manual-qr').value.trim();
            if (!code) {
                alert('Please enter a QR code');
                return;
            }
            fetchVehicleDetails(code);
        }

        async function fetchVehicleDetails(qrCode) {
            try {
                const response = await fetch(`${API_URL}/api/qr/generate.php?code=${qrCode}`);
                const data = await response.json();
                
                if (data.error) {
                    alert('Vehicle not found: ' + data.error);
                    return;
                }
                
                displayVehicleDetails(data);
                
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to fetch vehicle details');
            }
        }

        function displayVehicleDetails(data) {
            const content = `
                <div class="space-y-4">
                    <div class="border-b pb-4">
                        <h4 class="font-semibold mb-2">Vehicle Information</h4>
                        <p><span class="text-gray-600">License:</span> <strong>${data.vehicle.license_plate}</strong></p>
                        <p><span class="text-gray-600">Type:</span> ${data.vehicle.vehicle_type}</p>
                    </div>
                    <div class="border-b pb-4">
                        <h4 class="font-semibold mb-2">Owner</h4>
                        <p><span class="text-gray-600">Name:</span> ${data.owner.name}</p>
                        <p><span class="text-gray-600">Phone:</span> ${data.owner.phone}</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="window.location.href='/complaint.html?vehicle=${data.vehicle.license_plate}'" 
                            class="flex-1 px-4 py-2 bg-red-500 text-white rounded-lg">
                            🚨 Report Wrong Parking
                        </button>
                        <button onclick="window.location.href='tel:${data.owner.phone}'" 
                            class="flex-1 px-4 py-2 bg-blue-500 text-white rounded-lg">
                            📞 Call Owner
                        </button>
                    </div>
                </div>
            `;
            
            document.getElementById('result-content').innerHTML = content;
            document.getElementById('scan-result').classList.remove('hidden');
        }
    </script>
</body>
</html>
