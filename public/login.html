<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VITACITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50">
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <h1 class="text-2xl font-bold">🔐 Login</h1>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-md">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <h2 class="text-2xl font-bold mb-6 text-center">Welcome Back!</h2>
            
            <!-- Error Message -->
            <div id="error-message" class="hidden mb-4 bg-red-50 border-l-4 border-red-500 p-4 rounded">
                <p class="text-red-700 font-medium" id="error-text"></p>
            </div>

            <form id="login-form" class="space-y-4">
                <!-- Email/Phone -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email or Phone *</label>
                    <input type="text" id="login_id" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                        placeholder="ganesh@example.com or 7038170075"
                        value="7038170075">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password *</label>
                    <input type="password" id="password" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                        placeholder="Enter your password">
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-btn"
                    class="w-full gradient-bg text-white py-3 rounded-lg font-bold text-lg hover:opacity-90 transition">
                    Login
                </button>

                <!-- Register Link -->
                <p class="text-center text-sm text-gray-600 mt-4">
                    Don't have an account? 
                    <a href="/register.html" class="text-purple-600 font-medium hover:underline">Register here</a>
                </p>
            </form>
        </div>
    </main>

    <script>
        const API_URL = window.location.origin;
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            
            // Hide previous messages
            errorDiv.classList.add('hidden');
            
            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';
            
            // Get form data
            const loginData = {
                login_id: document.getElementById('login_id').value.trim(),
                password: document.getElementById('password').value
            };
            
            const apiUrl = `${API_URL}/api/auth.php?action=login`;
            console.log('Attempting login to:', apiUrl);
            console.log('Login data:', { login_id: loginData.login_id, password: '***' });
            
            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(loginData)
                });
                
                console.log('Response status:', response.status);
                console.log('Response ok:', response.ok);
                
                // Get response text first
                const responseText = await response.text();
                console.log('Response text:', responseText);
                
                // Try to parse as JSON
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseError) {
                    console.error('JSON parse error:', parseError);
                    throw new Error('Invalid response from server. Please try again.');
                }
                
                console.log('Parsed data:', data);
                
                if (data.success) {
                    console.log('Login successful!');
                    
                    // Store user data in localStorage
                    localStorage.setItem('vitacity_user_id', data.user.user_id);
                    localStorage.setItem('vitacity_user_name', data.user.full_name);
                    localStorage.setItem('vitacity_user_email', data.user.email);
                    localStorage.setItem('vitacity_user_phone', data.user.phone);
                    localStorage.setItem('vitacity_membership', data.user.membership_tier);
                    localStorage.setItem('vitacity_reward_points', data.user.reward_points || 0);
                    
                    if (data.user.emergency_contact_name) {
                        localStorage.setItem('vitacity_emergency_contact', JSON.stringify({
                            name: data.user.emergency_contact_name,
                            phone: data.user.emergency_contact_phone
                        }));
                    }
                    
                    console.log('Redirecting to dashboard...');
                    // Redirect to dashboard
                    window.location.href = '/dashboard.html';
                    
                } else {
                    // Show error
                    const errorMessage = data.error || data.message || 'Login failed';
                    console.error('Login error:', errorMessage);
                    errorText.textContent = errorMessage;
                    errorDiv.classList.remove('hidden');
                    
                    // Re-enable button
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Login';
                }
                
            } catch (error) {
                console.error('Login error (catch):', error);
                console.error('Error details:', error.message);
                
                errorText.textContent = error.message || 'Network error. Please check your connection and try again.';
                errorDiv.classList.remove('hidden');
                
                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });
        
        // Show current storage for debugging
        console.log('Current localStorage:', {
            user_id: localStorage.getItem('vitacity_user_id'),
            user_name: localStorage.getItem('vitacity_user_name')
        });
    </script>
</body>
</html>
