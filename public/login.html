<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VITACITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold gradient-bg bg-clip-text text-transparent">VITACITY</h1>
                <p class="text-gray-600 mt-2">Welcome back!</p>
            </div>

            <div class="bg-white rounded-lg shadow-xl p-8">
                <form id="login-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email or Phone</label>
                        <input type="text" id="login-id" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
                            placeholder="email@example.com or 7038170075">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input type="password" id="password" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
                            placeholder="Your password">
                    </div>

                    <button type="submit" 
                        class="w-full gradient-bg text-white py-3 rounded-lg font-semibold hover:opacity-90">
                        Login
                    </button>
                </form>

                <div class="mt-6 text-center space-y-2">
                    <p class="text-sm text-gray-600">
                        Don't have an account? 
                        <a href="/register.html" class="text-purple-600 font-medium hover:underline">Register</a>
                    </p>
                    <p class="text-sm">
                        <a href="/" class="text-gray-500 hover:text-gray-700">← Back to Home</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        // Check if already logged in
        if (localStorage.getItem('vitacity_user_id')) {
            window.location.href = '/dashboard.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const loginData = {
                login_id: document.getElementById('login-id').value,
                password: document.getElementById('password').value
            };
            
            try {
                const response = await fetch(`${API_URL}/api/auth/login.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });
                
                const result = await response.json();
                
                if (result.error) {
                    alert('Error: ' + result.error);
                    return;
                }
                
                // Save session
                localStorage.setItem('vitacity_user_id', result.user_id);
                localStorage.setItem('vitacity_user_name', result.full_name);
                localStorage.setItem('vitacity_user_email', result.email);
                localStorage.setItem('vitacity_membership', result.membership_tier);
                localStorage.setItem('vitacity_reward_points', result.reward_points);
                localStorage.setItem('vitacity_emergency_contact', JSON.stringify({
                    name: result.emergency_contact_name,
                    phone: result.emergency_contact_phone
                }));
                
                // Redirect to dashboard
                window.location.href = '/dashboard.html';
                
            } catch (error) {
                console.error('Login error:', error);
                alert('Login failed. Please check your credentials.');
            }
        });
    </script>
</body>
</html>
