<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Complaint - VITACITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50">
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold">📝 File Complaint</h1>
                <a href="/" class="px-4 py-2 bg-white text-purple-600 rounded-lg">← Back</a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="max-w-2xl mx-auto">
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-xl font-bold mb-6">Report an Issue</h2>

                <form id="complaint-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Complaint Type *
                        </label>
                        <select id="complaint-type" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                            <option value="">Select type...</option>
                            <option value="Wrong Parking">Wrong Parking</option>
                            <option value="Sensor Fault">Sensor Fault</option>
                            <option value="QR Unreadable">QR Code Damaged</option>
                            <option value="Billing Issue">Billing Issue</option>
                            <option value="Slot Maintenance">Maintenance Required</option>
                            <option value="Safety Concern">Safety Concern</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Zone *
                        </label>
                        <select id="zone-id" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                            <option value="">Loading zones...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Slot Number (optional)
                        </label>
                        <input type="text" id="slot-number" placeholder="e.g., A-15"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Title *
                        </label>
                        <input type="text" id="title" required placeholder="Brief description"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Description *
                        </label>
                        <textarea id="description" required rows="4" 
                            placeholder="Detailed description..."
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Priority
                        </label>
                        <select id="priority" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>

                    <div class="flex gap-3">
                        <button type="submit" 
                            class="flex-1 px-6 py-3 gradient-bg text-white rounded-lg font-medium">
                            Submit Complaint
                        </button>
                        <button type="button" onclick="window.location.href='/'" 
                            class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>

            <div id="success-message" class="hidden mt-6 bg-green-50 border-l-4 border-green-500 p-4 rounded">
                <p class="text-green-700">
                    ✅ Complaint filed successfully! <span id="complaint-code" class="font-bold"></span>
                </p>
                <p class="text-sm text-green-600 mt-1">You earned 5 reward points!</p>
            </div>
        </div>
    </main>

    <script>
        // FIXED API URL
        const API_URL = window.location.origin;
        
        document.addEventListener('DOMContentLoaded', () => {
            loadZones();
            
            const urlParams = new URLSearchParams(window.location.search);
            const vehicle = urlParams.get('vehicle');
            if (vehicle) {
                document.getElementById('title').value = `Wrong parking - ${vehicle}`;
                document.getElementById('complaint-type').value = 'Wrong Parking';
            }
        });

        async function loadZones() {
            try {
                const response = await fetch(`${API_URL}/api/zones.php`);
                const data = await response.json();
                
                const selector = document.getElementById('zone-id');
                selector.innerHTML = '<option value="">Select zone...</option>' +
                    data.zones.map(z => `<option value="${z.id}">${z.name} (${z.id})</option>`).join('');
                    
            } catch (error) {
                console.error('Error loading zones:', error);
            }
        }

        document.getElementById('complaint-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                user_id: 'demo-user',
                zone_id: document.getElementById('zone-id').value,
                slot_id: document.getElementById('slot-number').value || null,
                type: document.getElementById('complaint-type').value,
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                priority: document.getElementById('priority').value
            };
            
            try {
                const response = await fetch(`${API_URL}/api/complaints.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (result.error) {
                    alert('Error: ' + result.error);
                    return;
                }
                
                document.getElementById('complaint-code').textContent = result.complaint_code;
                document.getElementById('success-message').classList.remove('hidden');
                document.getElementById('complaint-form').reset();
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 3000);
                
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to submit complaint');
            }
        });
    </script>
</body>
</html>
