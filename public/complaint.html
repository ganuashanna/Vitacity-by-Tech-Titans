<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Complaint - VITACITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        #preview-container img, #preview-container video {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold">📝 File Complaint</h1>
                <a href="index.html" class="px-4 py-2 bg-white text-purple-600 rounded-lg">← Back</a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="max-w-2xl mx-auto">
            <!-- Complaint Form -->
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-xl font-bold mb-6">Report an Issue</h2>

                <form id="complaint-form" class="space-y-6">
                    <!-- User ID (hidden - in production, get from session) -->
                    <input type="hidden" id="user-id" value="test-user-id">

                    <!-- Complaint Type -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Complaint Type *
                        </label>
                        <select id="complaint-type" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                            <option value="">Select type...</option>
                            <option value="Wrong Parking">Wrong Parking</option>
                            <option value="Sensor Fault">Sensor Fault</option>
                            <option value="QR Unreadable">QR Code Damaged/Unreadable</option>
                            <option value="Billing Issue">Billing Issue</option>
                            <option value="Slot Maintenance">Slot Maintenance Required</option>
                            <option value="Safety Concern">Safety Concern</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <!-- Zone Selection -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Zone *
                        </label>
                        <select id="zone-id" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                            <option value="">Loading zones...</option>
                        </select>
                    </div>

                    <!-- Slot Number (optional) -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Slot Number (if applicable)
                        </label>
                        <input type="text" id="slot-number" placeholder="e.g., A-15, B-23"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                    </div>

                    <!-- Title -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Title *
                        </label>
                        <input type="text" id="title" required placeholder="Brief description of the issue"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                    </div>

                    <!-- Description -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Detailed Description *
                        </label>
                        <textarea id="description" required rows="4" 
                            placeholder="Provide detailed information about the issue..."
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"></textarea>
                    </div>

                    <!-- Photo/Video Upload -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Photo/Video Evidence
                        </label>
                        <div class="border-2 border-dashed border-gray-300 rounded-lg p-6">
                            <div class="text-center">
                                <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                    <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                                <div class="mt-4 flex flex-col sm:flex-row gap-2 justify-center">
                                    <button type="button" onclick="document.getElementById('file-upload').click()" 
                                        class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">
                                        📁 Choose File
                                    </button>
                                    <button type="button" onclick="openCamera()" 
                                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                        📷 Take Photo
                                    </button>
                                </div>
                                <input id="file-upload" type="file" class="hidden" 
                                    accept="image/*,video/*" onchange="handleFileSelect(event)">
                                <p class="mt-2 text-xs text-gray-500">PNG, JPG, MP4 up to 10MB</p>
                            </div>
                        </div>

                        <!-- Preview -->
                        <div id="preview-container" class="mt-4 hidden">
                            <p class="text-sm font-medium text-gray-700 mb-2">Preview:</p>
                            <div id="preview-content"></div>
                            <button type="button" onclick="removeMedia()" 
                                class="mt-2 text-sm text-red-600 hover:text-red-800">
                                ✕ Remove
                            </button>
                        </div>
                    </div>

                    <!-- Camera Capture -->
                    <div id="camera-section" class="hidden">
                        <video id="camera-stream" autoplay class="w-full rounded-lg"></video>
                        <div class="mt-3 flex gap-2">
                            <button type="button" onclick="capturePhoto()" 
                                class="flex-1 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                                📸 Capture
                            </button>
                            <button type="button" onclick="closeCamera()" 
                                class="flex-1 px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">
                                Cancel
                            </button>
                        </div>
                        <canvas id="canvas" class="hidden"></canvas>
                    </div>

                    <!-- Priority -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Priority
                        </label>
                        <select id="priority" 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>

                    <!-- Submit Button -->
                    <div class="flex gap-3">
                        <button type="submit" 
                            class="flex-1 px-6 py-3 gradient-bg text-white rounded-lg font-medium hover:opacity-90">
                            Submit Complaint
                        </button>
                        <button type="button" onclick="window.location.href='index.html'" 
                            class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>

            <!-- Success Message -->
            <div id="success-message" class="hidden mt-6 bg-green-50 border-l-4 border-green-500 p-4 rounded">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-green-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-green-700">
                            Complaint filed successfully! <span id="complaint-code" class="font-bold"></span>
                        </p>
                        <p class="text-xs text-green-600 mt-1">You earned 5 reward points!</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost/vitacity' 
            : window.location.origin;

        let selectedMedia = null;
        let cameraStream = null;

        // Load zones on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadZones();
            
            // Check if vehicle parameter in URL
            const urlParams = new URLSearchParams(window.location.search);
            const vehicle = urlParams.get('vehicle');
            if (vehicle) {
                document.getElementById('title').value = `Wrong parking - ${vehicle}`;
                document.getElementById('complaint-type').value = 'Wrong Parking';
            }
        });

        // Load zones
        async function loadZones() {
            try {
                const response = await fetch(`${API_URL}/api/zones.php`);
                const data = await response.json();
                
                const selector = document.getElementById('zone-id');
                selector.innerHTML = '<option value="">Select zone...</option>' +
                    data.zones.map(z => `<option value="${z.id}">${z.name} (${z.id})</option>`).join('');
                    
            } catch (error) {
                console.error('Error loading zones:', error);
            }
        }

        // Handle file selection
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // Check file size (10MB max)
            if (file.size > 10 * 1024 * 1024) {
                alert('File size must be less than 10MB');
                return;
            }
            
            selectedMedia = file;
            showPreview(file);
        }

        // Show preview
        function showPreview(file) {
            const container = document.getElementById('preview-container');
            const content = document.getElementById('preview-content');
            
            const reader = new FileReader();
            reader.onload = (e) => {
                if (file.type.startsWith('image/')) {
                    content.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                } else if (file.type.startsWith('video/')) {
                    content.innerHTML = `<video src="${e.target.result}" controls></video>`;
                }
                container.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        // Remove media
        function removeMedia() {
            selectedMedia = null;
            document.getElementById('file-upload').value = '';
            document.getElementById('preview-container').classList.add('hidden');
        }

        // Open camera
        async function openCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                cameraStream = stream;
                document.getElementById('camera-stream').srcObject = stream;
                document.getElementById('camera-section').classList.remove('hidden');
            } catch (error) {
                alert('Camera access denied or not available');
                console.error('Camera error:', error);
            }
        }

        // Capture photo from camera
        function capturePhoto() {
            const video = document.getElementById('camera-stream');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            
            canvas.toBlob((blob) => {
                selectedMedia = new File([blob], 'camera-photo.jpg', { type: 'image/jpeg' });
                showPreview(selectedMedia);
                closeCamera();
            }, 'image/jpeg');
        }

        // Close camera
        function closeCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            document.getElementById('camera-section').classList.add('hidden');
        }

        // Submit complaint
        document.getElementById('complaint-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                user_id: document.getElementById('user-id').value,
                zone_id: document.getElementById('zone-id').value,
                slot_id: document.getElementById('slot-number').value || null,
                type: document.getElementById('complaint-type').value,
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                priority: document.getElementById('priority').value
            };
            
            // Note: In production, you'd upload the media to a server first
            // For now, we're just submitting the complaint without the file
            
            try {
                const response = await fetch(`${API_URL}/api/complaints.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (result.error) {
                    alert('Error: ' + result.error);
                    return;
                }
                
                // Show success
                document.getElementById('complaint-code').textContent = result.complaint_code;
                document.getElementById('success-message').classList.remove('hidden');
                document.getElementById('complaint-form').reset();
                removeMedia();
                
                // Scroll to success message
                document.getElementById('success-message').scrollIntoView({ behavior: 'smooth' });
                
                // Redirect after 3 seconds
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);
                
            } catch (error) {
                console.error('Error submitting complaint:', error);
                alert('Failed to submit complaint. Please try again.');
            }
        });
    </script>
</body>
</html>
