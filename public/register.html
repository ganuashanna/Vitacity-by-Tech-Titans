<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - VITACITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50">
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <h1 class="text-2xl font-bold">📝 Create Account</h1>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-2xl">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <h2 class="text-2xl font-bold mb-6">Register for VITACITY</h2>
            
            <!-- Error Message -->
            <div id="error-message" class="hidden mb-4 bg-red-50 border-l-4 border-red-500 p-4 rounded">
                <p class="text-red-700 font-medium" id="error-text"></p>
            </div>
            
            <!-- Success Message -->
            <div id="success-message" class="hidden mb-4 bg-green-50 border-l-4 border-green-500 p-4 rounded">
                <p class="text-green-700 font-medium">✅ Registration successful! Redirecting to login...</p>
            </div>

            <form id="register-form" class="space-y-4">
                <!-- Full Name -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Full Name *</label>
                    <input type="text" id="full_name" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                        placeholder="Ganesh Ashanna">
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email *</label>
                    <input type="email" id="email" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                        placeholder="ganesh@example.com">
                </div>

                <!-- Phone -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number *</label>
                    <input type="tel" id="phone" required pattern="[6-9][0-9]{9}" maxlength="10"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                        placeholder="7038170075">
                    <p class="text-xs text-gray-500 mt-1">10-digit Indian mobile number</p>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password *</label>
                    <input type="password" id="password" required minlength="6"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                        placeholder="Enter strong password">
                    <p class="text-xs text-gray-500 mt-1">Minimum 6 characters</p>
                </div>

                <!-- Emergency Contact Name -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Emergency Contact Name</label>
                    <input type="text" id="emergency_contact_name"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                        placeholder="Parent/Spouse/Friend Name">
                    <p class="text-xs text-gray-500 mt-1">In case of accident, we'll notify them</p>
                </div>

                <!-- Emergency Contact Phone -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Emergency Contact Phone</label>
                    <input type="tel" id="emergency_contact_phone" pattern="[6-9][0-9]{9}" maxlength="10"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"
                        placeholder="9876543210">
                </div>

                <!-- Membership Tier -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Membership Tier</label>
                    <select id="membership_tier"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500">
                        <option value="Bronze">Bronze (Free) - Local zone only</option>
                        <option value="Silver">Silver (₹199) - 5km radius</option>
                        <option value="Gold">Gold (₹499) - Book from anywhere ⭐</option>
                        <option value="Platinum">Platinum (₹999) - Priority + anywhere</option>
                    </select>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-btn"
                    class="w-full gradient-bg text-white py-3 rounded-lg font-bold text-lg hover:opacity-90 transition">
                    Create Account
                </button>

                <!-- Login Link -->
                <p class="text-center text-sm text-gray-600 mt-4">
                    Already have an account? 
                    <a href="/login.html" class="text-purple-600 font-medium hover:underline">Login here</a>
                </p>
            </form>
        </div>
    </main>

    <script>
        const API_URL = window.location.origin;
        
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            const errorText = document.getElementById('error-text');
            
            // Hide previous messages
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            
            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';
            
            // Get form data
            const formData = {
                full_name: document.getElementById('full_name').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                password: document.getElementById('password').value,
                emergency_contact_name: document.getElementById('emergency_contact_name').value.trim(),
                emergency_contact_phone: document.getElementById('emergency_contact_phone').value.trim(),
                membership_tier: document.getElementById('membership_tier').value
            };
            
            try {
                console.log('Sending registration request to:', `${API_URL}/api/auth.php?action=register`);
                console.log('Data:', formData);
                
                const response = await fetch(`${API_URL}/api/auth.php?action=register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                console.log('Response:', data);
                
                if (data.success) {
                    // Store user data in localStorage
                    localStorage.setItem('vitacity_user_id', data.user.user_id);
                    localStorage.setItem('vitacity_user_name', data.user.full_name);
                    localStorage.setItem('vitacity_user_email', data.user.email);
                    localStorage.setItem('vitacity_user_phone', data.user.phone);
                    localStorage.setItem('vitacity_membership', data.user.membership_tier);
                    localStorage.setItem('vitacity_reward_points', data.user.reward_points);
                    localStorage.setItem('vitacity_emergency_contact', JSON.stringify({
                        name: data.user.emergency_contact_name,
                        phone: data.user.emergency_contact_phone
                    }));
                    
                    // Show success message
                    successDiv.classList.remove('hidden');
                    
                    // Redirect to dashboard after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 2000);
                    
                } else {
                    // Show error
                    errorText.textContent = data.error || data.message || 'Registration failed';
                    errorDiv.classList.remove('hidden');
                    
                    // Re-enable button
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
                
            } catch (error) {
                console.error('Registration error:', error);
                errorText.textContent = 'Network error. Please check your connection and try again.';
                errorDiv.classList.remove('hidden');
                
                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
