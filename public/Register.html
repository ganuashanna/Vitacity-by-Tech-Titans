<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - VITACITY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold gradient-bg bg-clip-text text-transparent">VITACITY</h1>
                <p class="text-gray-600 mt-2">Create your account</p>
            </div>

            <!-- Registration Form -->
            <div class="bg-white rounded-lg shadow-xl p-8">
                <form id="register-form" class="space-y-6">
                    <!-- Full Name -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Full Name *</label>
                        <input type="text" id="full-name" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
                            placeholder="Ganesh Ashanna">
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email *</label>
                        <input type="email" id="email" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
                            placeholder="ganesh@example.com">
                    </div>

                    <!-- Phone -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number *</label>
                        <input type="tel" id="phone" required pattern="[0-9]{10}"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
                            placeholder="7038170075">
                    </div>

                    <!-- Emergency Contact -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Emergency Contact Name *</label>
                        <input type="text" id="emergency-name" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
                            placeholder="Family member name">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Emergency Contact Phone *</label>
                        <input type="tel" id="emergency-phone" required pattern="[0-9]{10}"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
                            placeholder="Emergency contact number">
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password *</label>
                        <input type="password" id="password" required minlength="6"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
                            placeholder="At least 6 characters">
                    </div>

                    <!-- Membership Tier -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Select Membership *</label>
                        <select id="membership-tier" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                            <option value="Bronze">Bronze (Free) - Local zone booking only</option>
                            <option value="Silver">Silver (₹199/month) - 5km radius booking</option>
                            <option value="Gold">Gold (₹499/month) - Book from anywhere! ⭐</option>
                            <option value="Platinum">Platinum (₹999/month) - Priority + anywhere</option>
                        </select>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" 
                        class="w-full gradient-bg text-white py-3 rounded-lg font-semibold hover:opacity-90 transition">
                        Create Account
                    </button>
                </form>

                <!-- Login Link -->
                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-600">
                        Already have an account? 
                        <a href="/login.html" class="text-purple-600 font-medium hover:underline">Login</a>
                    </p>
                </div>
            </div>

            <!-- Success Message -->
            <div id="success-message" class="hidden mt-6 bg-green-50 border-l-4 border-green-500 p-4 rounded">
                <p class="text-green-700 font-medium">✅ Account created successfully!</p>
                <p class="text-sm text-green-600 mt-1">Redirecting to login...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userData = {
                full_name: document.getElementById('full-name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value,
                emergency_contact_name: document.getElementById('emergency-name').value,
                emergency_contact_phone: document.getElementById('emergency-phone').value,
                membership_tier: document.getElementById('membership-tier').value
            };
            
            try {
                const response = await fetch(`${API_URL}/api/auth/register.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                const result = await response.json();
                
                if (result.error) {
                    alert('Error: ' + result.error);
                    return;
                }
                
                // Success!
                document.getElementById('success-message').classList.remove('hidden');
                document.getElementById('register-form').reset();
                
                // Save user ID to localStorage
                localStorage.setItem('vitacity_user_id', result.user_id);
                localStorage.setItem('vitacity_user_name', result.user_name);
                localStorage.setItem('vitacity_membership', result.membership_tier);
                
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2000);
                
            } catch (error) {
                console.error('Registration error:', error);
                alert('Registration failed. Please try again.');
            }
        });

        // Show membership benefits on hover
        document.getElementById('membership-tier').addEventListener('change', (e) => {
            const tier = e.target.value;
            const benefits = {
                'Bronze': 'Free - Can only book in nearby zones when physically present',
                'Silver': '₹199/month - Book within 5km radius',
                'Gold': '₹499/month - Book from ANYWHERE in Solapur + 10% discount',
                'Platinum': '₹999/month - Book anywhere + Priority slots + 15% discount + 24/7 support'
            };
            console.log(benefits[tier]);
        });
    </script>
</body>
</html>
